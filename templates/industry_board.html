<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业板块 · Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <section class="hero">
        <div class="hero-head">
            <div class="hero-title"><h1>行业板块资金流向</h1><p>聚合行业热度、涨跌幅与净流入，帮助你先看方向，再决定是否下钻到个股。</p></div>
            <div class="hero-actions"><button id="refresh-btn" class="btn btn-primary">刷新数据</button></div>
        </div>
        <div class="nav-pills-bar">
            <a class="nav-chip" href="/">组合</a><a class="nav-chip" href="/monitor">监控</a><a class="nav-chip" href="/tools">工具</a><a class="nav-chip is-active" href="/industry-board">行业板块</a><a class="nav-chip" href="/xueqiu">雪球组合</a><a class="nav-chip" href="/admin">数据管理</a>
        </div>
    </section>
    <section class="surface section">
        <div class="section-title"><div><h3>板块排行</h3><p>通过红绿和数值权重，优先突出净流入与涨跌幅信息。</p></div></div>
        <div id="boards-container" class="table-wrap"><div class="empty-state">正在加载数据...</div></div>
    </section>
</div>
<script>
function formatPercent(num){ if(num===undefined||num===null||isNaN(num)) return '-'; return `${num.toFixed(2)}%`; }
function formatNumber(num){ if(num===undefined||num===null||isNaN(num)) return '-'; return num.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
async function loadData(){ const btn=document.getElementById('refresh-btn'); const container=document.getElementById('boards-container'); btn.disabled=true; btn.innerHTML='<span class="spinner-border spinner-border-sm"></span> 加载中'; try{ const response=await fetch(`/api/industry-board/latest?t=${Date.now()}`); const result=await response.json(); if(result.status!=='success') throw new Error('加载失败'); const boards=result.data||[]; if(!boards.length){ container.innerHTML='<div class="empty-state">暂无板块数据</div>'; return; } let html='<table class="table-modern"><thead><tr><th class="text-center">排名</th><th>行业</th><th class="text-end">涨跌幅</th><th class="text-end">流入资金(亿)</th><th class="text-end">流出资金(亿)</th><th class="text-end">净额(亿)</th></tr></thead><tbody>'; boards.forEach(board=>{ const changeClass=board.change_percent>0?'status-positive':board.change_percent<0?'status-negative':'status-neutral'; const netClass=board.net_amount>0?'status-positive':board.net_amount<0?'status-negative':'status-neutral'; const changeSign=board.change_percent>0?'+':''; const netSign=board.net_amount>0?'+':''; html+=`<tr><td class="text-center mono">${board.rank||'-'}</td><td><strong>${board.board_name}</strong></td><td class="text-end mono ${changeClass}">${changeSign}${formatPercent(board.change_percent)}</td><td class="text-end mono">${formatNumber(board.inflow)}</td><td class="text-end mono">${formatNumber(board.outflow)}</td><td class="text-end mono ${netClass}">${netSign}${formatNumber(board.net_amount)}</td></tr>`; }); html+='</tbody></table>'; container.innerHTML=html; }catch(error){ console.error(error); container.innerHTML='<div class="empty-state text-danger">行业板块数据加载失败</div>'; }finally{ btn.disabled=false; btn.innerHTML='刷新数据'; }}
document.addEventListener('DOMContentLoaded',loadData); document.getElementById('refresh-btn').addEventListener('click',loadData);
</script>
</body>
</html>
