<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资组合 · Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <section class="hero">
            <div class="hero-head">
                <div class="hero-title">
                    <h1>投资组合总览</h1>
                </div>
                <div class="hero-actions">
                    <span class="last-update" id="update-time">等待更新</span>
                    <button id="refresh-btn" class="btn btn-primary">刷新数据</button>
                </div>
            </div>
            <div class="nav-pills-bar">
                <a class="nav-chip is-active" href="/">组合</a>
                <a class="nav-chip" href="/monitor">监控</a>
                <a class="nav-chip" href="/tools">工具</a>
                <a class="nav-chip" href="/xueqiu">雪球组合</a>
                <a class="nav-chip" href="/admin">数据管理</a>
            </div>
        </section>

        <section class="surface section">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">总市值</div>
                    <div class="metric-value mono" id="sum-market-value-card">-</div>
                    <div class="metric-sub">当前持仓总价值</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">累计盈亏</div>
                    <div class="metric-value mono" id="sum-profit-card">-</div>
                    <div class="metric-sub">按最新价格估算</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">股息率</div>
                    <div class="metric-value mono" id="sum-dividend-yield-card">-</div>
                    <div class="metric-sub">年化股息 / 总市值</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">年度股息</div>
                    <div class="metric-value mono" id="sum-annual-dividend-card">-</div>
                    <div class="metric-sub">按当前持仓测算</div>
                </div>
            </div>

            <div class="section-title">
                <div>
                    <h3>持仓明细</h3>
                </div>
            </div>

            <div class="table-wrap">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th class="text-end">现价</th>
                            <th class="text-end">成本</th>
                            <th class="text-end">持股数</th>
                            <th class="text-end">市值</th>
                            <th class="text-end">盈亏</th>
                            <th class="text-end">每股分红</th>
                            <th class="text-end">股息率</th>
                            <th class="text-end">年度股息</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="9" class="empty-state">正在加载数据...</td></tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td>总计</td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td class="text-end mono" id="sum-market-value">-</td>
                            <td class="text-end mono" id="sum-profit">-</td>
                            <td></td>
                            <td class="text-end mono" id="sum-dividend-yield">-</td>
                            <td class="text-end mono" id="sum-annual-dividend">-</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </section>
    </div>

    <script>
        function formatMoney(num) {
            if (num === undefined || num === null || Number.isNaN(num)) return '-';
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatPercent(num) {
            if (num === undefined || num === null || Number.isNaN(num)) return '-';
            return `${num.toFixed(2)}%`;
        }

        function setValue(id, value) {
            document.getElementById(id).textContent = value;
        }

        function setProfitStyle(element, value) {
            element.classList.remove('status-positive', 'status-negative', 'status-neutral');
            if (value > 0) element.classList.add('status-positive');
            else if (value < 0) element.classList.add('status-negative');
            else element.classList.add('status-neutral');
        }

        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            const tbody = document.getElementById('table-body');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 加载中';

            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();

                if (data.status !== 'success') throw new Error('加载失败');

                tbody.innerHTML = '';
                data.rows.forEach(row => {
                    const profitClass = row.profit > 0 ? 'status-positive' : row.profit < 0 ? 'status-negative' : 'status-neutral';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${row.name}</strong><div class="text-muted small">${row.code}</div></td>
                        <td class="text-end mono">${formatMoney(row.current_price)}</td>
                        <td class="text-end mono">${formatMoney(row.cost_price)}</td>
                        <td class="text-end mono">${row.shares.toLocaleString()}</td>
                        <td class="text-end mono fw-bold">${formatMoney(row.market_value)}</td>
                        <td class="text-end mono fw-bold ${profitClass}">${formatMoney(row.profit)}</td>
                        <td class="text-end mono">${formatMoney(row.dividend_per_share)}</td>
                        <td class="text-end mono">${formatPercent(row.dividend_yield)}</td>
                        <td class="text-end mono">${formatMoney(row.annual_dividend_income)}</td>`;
                    tbody.appendChild(tr);
                });

                setValue('sum-market-value', formatMoney(data.summary.market_value));
                setValue('sum-profit', formatMoney(data.summary.profit));
                setValue('sum-dividend-yield', formatPercent(data.summary.dividend_yield));
                setValue('sum-annual-dividend', formatMoney(data.summary.annual_dividend));
                setValue('sum-market-value-card', formatMoney(data.summary.market_value));
                setValue('sum-profit-card', formatMoney(data.summary.profit));
                setValue('sum-dividend-yield-card', formatPercent(data.summary.dividend_yield));
                setValue('sum-annual-dividend-card', formatMoney(data.summary.annual_dividend));
                document.getElementById('update-time').textContent = `最后更新：${data.timestamp}`;

                setProfitStyle(document.getElementById('sum-profit'), data.summary.profit);
                setProfitStyle(document.getElementById('sum-profit-card'), data.summary.profit);
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="9" class="empty-state text-danger">数据加载失败，请稍后重试。</td></tr>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '刷新数据';
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);
        document.getElementById('refresh-btn').addEventListener('click', loadData);
    </script>
</body>
</html>
