<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body class="dashboard-home">
    <div class="app-shell">
        <section class="hero">
            <div class="hero-head">
                <div class="hero-title">
                    <h1>每日决策工作台</h1>
                </div>
                <div class="hero-actions">
                    <span class="last-update" id="update-time">等待更新</span>
                    <button id="refresh-btn" class="btn btn-primary">刷新数据</button>
                </div>
            </div>
            <div class="nav-pills-bar">
                <a class="nav-chip is-active" href="/">首页</a>
                <a class="nav-chip" href="/monitor">监控</a>
                <a class="nav-chip" href="/tools">工具</a>
                <a class="nav-chip" href="/portfolios">组合</a>
                <a class="nav-chip" href="/analysis">分析</a>
                <a class="nav-chip" href="/recaps">复盘</a>
                <a class="nav-chip" href="/learn">学习</a>
                <a class="nav-chip" href="/admin">管理</a>
            </div>
        </section>

        <section class="surface section">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">总市值</div>
                    <div class="metric-value mono" id="market-value">-</div>
                    <div class="metric-sub">当前持仓总估值</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">累计盈亏</div>
                    <div class="metric-value mono" id="profit-value">-</div>
                    <div class="metric-sub">按最新价格估算</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">年度股息</div>
                    <div class="metric-value mono" id="dividend-value">-</div>
                    <div class="metric-sub">按当前持仓测算</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">股息率</div>
                    <div class="metric-value mono" id="dividend-yield">-</div>
                    <div class="metric-sub">年度股息 / 总市值</div>
                </div>
            </div>
        </section>

        <section class="surface section section-feature section-single">
            <div class="section-title">
                <div>
                    <h3>今日重点股票</h3>
                </div>
            </div>
            <div id="focus-cards" class="focus-list">
                <div class="empty-state-card">
                    <div class="empty-state-mark">-</div>
                    <div class="empty-state-title">正在加载重点股票</div>
                    <div class="empty-state-copy">请稍候，系统正在整理今日关注标的。</div>
                </div>
            </div>
        </section>

        <section class="surface section section-table section-table-full">
            <div class="section-title">
                <div>
                    <h3>持仓预览</h3>
                </div>
            </div>
            <div class="table-wrap">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th class="text-end">现价</th>
                            <th class="text-end">成本</th>
                            <th class="text-end">股数</th>
                            <th class="text-end">股息率</th>
                            <th class="text-end">市值</th>
                            <th class="text-end">盈亏</th>
                        </tr>
                    </thead>
                    <tbody id="portfolio-body">
                        <tr><td colspan="7" class="empty-state-table">正在加载持仓数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        function safeNumber(num) {
            const value = Number(num);
            return Number.isFinite(value) ? value : null;
        }

        function formatMoney(num) {
            const value = safeNumber(num);
            if (value === null) return '-';
            return value.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatCurrency(num) {
            const value = safeNumber(num);
            if (value === null) return '-';
            return `¥${formatMoney(value)}`;
        }

        function formatSignedCurrency(num) {
            const value = safeNumber(num);
            if (value === null) return '-';
            const sign = value > 0 ? '+' : value < 0 ? '-' : '';
            return `${sign}¥${formatMoney(Math.abs(value))}`;
        }

        function formatPercent(num) {
            const value = safeNumber(num);
            if (value === null) return '-';
            return `${(value * 100).toFixed(2)}%`;
        }

        function formatDisplayPercent(num) {
            const value = safeNumber(num);
            if (value === null) return '-';
            return `${value.toFixed(2)}%`;
        }

        function formatSignedDisplayPercent(num) {
            const value = safeNumber(num);
            if (value === null) return '-';
            const sign = value > 0 ? '+' : value < 0 ? '-' : '';
            return `${sign}${Math.abs(value).toFixed(2)}%`;
        }

        function badge(text, tone) {
            return `<span class="badge-soft ${tone}">${text}</span>`;
        }

        function actionBadge(label) {
            if (label === '可分批') return badge(label, 'badge-success-soft');
            if (label === '接近买点') return badge(label, 'badge-primary-soft');
            if (label === '风险') return badge(label, 'badge-warning-soft');
            if (label === '高估谨慎') return badge(label, 'badge-danger-soft');
            return badge(label || '观察', 'badge-gray-soft');
        }

        function trendBadge(label) {
            if (label === '多头') return badge(label, 'badge-success-soft');
            if (label === '空头') return badge(label, 'badge-danger-soft');
            return badge(label || '未知', 'badge-gray-soft');
        }

        function valuationBadge(label) {
            if (label === '低估') return badge(label, 'badge-success-soft');
            if (label === '高估') return badge(label, 'badge-danger-soft');
            return badge(label || '未知', 'badge-gray-soft');
        }

        function reasons(tags) {
            return (tags || []).join('、') || '-';
        }

        function emptyState(message, copy) {
            return `
                <div class="empty-state-card">
                    <div class="empty-state-mark">-</div>
                    <div class="empty-state-title">${message}</div>
                    <div class="empty-state-copy">${copy}</div>
                </div>
            `;
        }

        function valueToneClass(value) {
            const amount = safeNumber(value);
            if (amount === null || amount === 0) return 'status-neutral';
            return amount > 0 ? 'status-positive' : 'status-negative';
        }

        function renderPriceChange(stock) {
            const change = safeNumber(stock.change);
            const changePct = safeNumber(stock.change_pct);
            if (change === null && changePct === null) {
                return '<span class="focus-card-change status-neutral mono">--</span>';
            }
            const toneClass = valueToneClass(change ?? changePct);
            const segments = [];
            if (change !== null) segments.push(formatSignedCurrency(change));
            if (changePct !== null) segments.push(`(${formatSignedDisplayPercent(changePct)})`);
            return `<span class="focus-card-change ${toneClass} mono">${segments.join(' ')}</span>`;
        }

        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 加载中';

            try {
                const response = await fetch('/api/dashboard');
                const result = await response.json();
                if (result.status !== 'success') throw new Error('加载失败');

                const data = result.data || {};
                const summary = data.portfolio_summary || {};
                const marketValue = Number(summary.market_value) || 0;
                const annualDividend = Number(summary.annual_dividend) || 0;
                const dividendYield = marketValue > 0 ? annualDividend / marketValue : null;

                document.getElementById('market-value').textContent = formatCurrency(summary.market_value);

                const profitValue = document.getElementById('profit-value');
                profitValue.textContent = formatSignedCurrency(summary.profit);
                profitValue.className = `metric-value mono ${valueToneClass(summary.profit)}`;

                document.getElementById('dividend-value').textContent = formatCurrency(summary.annual_dividend);
                document.getElementById('dividend-yield').textContent = formatPercent(dividendYield);
                document.getElementById('update-time').textContent = `最后更新：${result.timestamp}`;

                renderFocusCards(data.focus_stocks || []);
                renderPortfolio(data.portfolio_rows || []);
            } catch (error) {
                console.error(error);
                document.getElementById('focus-cards').innerHTML = emptyState('首页数据加载失败', '请检查接口状态后重试。');
                document.getElementById('portfolio-body').innerHTML = '<tr><td colspan="7" class="empty-state-table">持仓数据加载失败，请稍后重试。</td></tr>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '刷新数据';
            }
        }

        function renderFocusCards(items) {
            const container = document.getElementById('focus-cards');
            if (!items.length) {
                container.innerHTML = emptyState('暂无重点股票', '当前没有满足条件的标的，稍后刷新再看。');
                return;
            }

            container.innerHTML = items.slice(0, 6).map(stock => `
                <article class="focus-card">
                    <div class="focus-card-head">
                        <div>
                            <h4>${stock.name}</h4>
                            <div class="text-muted small">${stock.code}</div>
                        </div>
                        <div class="focus-score mono">${stock.score ?? '-'}</div>
                    </div>
                    <div class="focus-card-meta">
                        ${actionBadge(stock.action_label)}
                        ${trendBadge(stock.trend)}
                        ${valuationBadge(stock.valuation_status)}
                    </div>
                    <div class="focus-card-price-row">
                        <div class="focus-card-price mono">${formatCurrency(stock.current_price)}</div>
                        ${renderPriceChange(stock)}
                    </div>
                    <div class="focus-card-reasons">${reasons(stock.reason_tags)}</div>
                </article>
            `).join('');
        }

        function renderPortfolio(items) {
            const tbody = document.getElementById('portfolio-body');
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state-table">暂无持仓数据，添加持仓后会在这里展示。</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(row => `
                <tr class="portfolio-row">
                    <td>
                        <strong>${row.name}</strong>
                        <div class="text-muted small">${row.code}</div>
                    </td>
                    <td class="text-end mono cell-num">${formatCurrency(row.current_price)}</td>
                    <td class="text-end mono cell-num">${formatCurrency(row.cost_price)}</td>
                    <td class="text-end mono cell-num">${Number(row.shares ?? 0).toLocaleString('zh-CN')}</td>
                    <td class="text-end mono cell-num">${formatDisplayPercent(row.dividend_yield)}</td>
                    <td class="text-end mono cell-num">${formatCurrency(row.market_value)}</td>
                    <td class="text-end mono cell-num ${valueToneClass(row.profit)}">${formatSignedCurrency(row.profit)}</td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', loadData);
        document.getElementById('refresh-btn').addEventListener('click', loadData);
    </script>
</body>
</html>
