<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>监控看板 · Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <section class="hero">
            <div class="hero-head">
                <div class="hero-title">
                    <h1>加仓监控看板</h1>
                </div>
                <div class="hero-actions">
                    <span class="last-update" id="update-time">等待更新</span>
                    <button id="update-kline-btn" class="btn btn-warning">更新 K 线</button>
                    <button id="refresh-btn" class="btn btn-primary">刷新数据</button>
                </div>
            </div>
            <div class="nav-pills-bar">
                <a class="nav-chip" href="/">组合</a>
                <a class="nav-chip is-active" href="/monitor">监控</a>
                <a class="nav-chip" href="/tools">工具</a>
                <a class="nav-chip" href="/industry-board">行业板块</a>
                <a class="nav-chip" href="/xueqiu">雪球组合</a>
                <a class="nav-chip" href="/admin">数据管理</a>
            </div>
        </section>

        <section class="surface section">
            <div class="section-title"><div><h3>监控列表</h3></div></div>
            <div class="table-wrap">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th class="text-end">现价</th>
                            <th class="text-end">估值 PE</th>
                            <th class="text-end">EPS 预测</th>
                            <th class="text-end">合理价格</th>
                            <th class="text-center">估值状态</th>
                            <th class="text-center">周期</th>
                            <th class="text-center">趋势</th>
                            <th class="text-end">进场位 1</th>
                            <th class="text-end">进场位 2</th>
                            <th class="text-center">技术状态</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="11" class="empty-state">正在加载监控数据...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        function formatMoney(num) {
            if (num === undefined || num === null || Number.isNaN(num)) return '-';
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function badge(text, tone) {
            return `<span class="badge-soft ${tone}">${text}</span>`;
        }

        function getTrendBadge(stock) {
            if (stock.timeframe === '1d' && stock.ema5 && stock.ema10 && stock.ema20) {
                if (stock.ema5 > stock.ema10 && stock.ema10 > stock.ema20) return badge('多头', 'badge-success-soft');
                if (stock.ema5 < stock.ema10 && stock.ema10 < stock.ema20) return badge('空头', 'badge-danger-soft');
                return badge('震荡', 'badge-gray-soft');
            }
            if (stock.timeframe === '2d' && stock.ema10 && stock.ema30 && stock.ema60) {
                if (stock.ema10 > stock.ema30 && stock.ema30 > stock.ema60) return badge('多头', 'badge-success-soft');
                if (stock.ema10 < stock.ema30 && stock.ema30 < stock.ema60) return badge('空头', 'badge-danger-soft');
                return badge('震荡', 'badge-gray-soft');
            }
            if (stock.timeframe === '3d' && stock.ema7 && stock.ema21 && stock.ema42) {
                if (stock.ema7 > stock.ema21 && stock.ema21 > stock.ema42) return badge('多头', 'badge-success-soft');
                if (stock.ema7 < stock.ema21 && stock.ema21 < stock.ema42) return badge('空头', 'badge-danger-soft');
                return badge('震荡', 'badge-gray-soft');
            }
            return badge('未知', 'badge-gray-soft');
        }

        async function loadData() {
            const btn = document.getElementById('refresh-btn');
            const tbody = document.getElementById('table-body');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 加载中';

            try {
                const response = await fetch('/api/monitor');
                const data = await response.json();
                if (data.status !== 'success') throw new Error('加载失败');

                const timeframeMap = { '1d': '日线', '2d': '2日线', '3d': '3日线' };
                tbody.innerHTML = '';

                data.stocks.forEach(stock => {
                    const valuationBadge = stock.valuation_status === '低估'
                        ? badge('低估', 'badge-success-soft')
                        : stock.valuation_status === '高估'
                            ? badge('高估', 'badge-danger-soft')
                            : stock.valuation_status === '正常'
                                ? badge('正常', 'badge-gray-soft')
                                : badge('未知', 'badge-gray-soft');

                    const technicalBadge = stock.technical_status === '加仓'
                        ? badge('加仓', 'badge-success-soft')
                        : stock.technical_status === '破位'
                            ? badge('破位', 'badge-warning-soft')
                            : badge('无信号', 'badge-gray-soft');

                    const minPrice = stock.eps_forecast ? stock.eps_forecast * (stock.reasonable_pe_min || 15) : null;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${stock.name}</strong><div class="text-muted small">${stock.code}</div></td>
                        <td class="text-end mono">${formatMoney(stock.current_price)}</td>
                        <td class="text-end mono">${stock.reasonable_pe_min || 15} - ${stock.reasonable_pe_max || 20}</td>
                        <td class="text-end mono">${stock.eps_forecast ? formatMoney(stock.eps_forecast) : '-'}</td>
                        <td class="text-end mono">${minPrice ? formatMoney(minPrice) : '-'}</td>
                        <td class="text-center">${valuationBadge}</td>
                        <td class="text-center">${badge(timeframeMap[stock.timeframe] || stock.timeframe, 'badge-primary-soft')}</td>
                        <td class="text-center">${getTrendBadge(stock)}</td>
                        <td class="text-end mono">${formatMoney(stock.ema144)}</td>
                        <td class="text-end mono">${formatMoney(stock.ema188)}</td>
                        <td class="text-center">${technicalBadge}</td>`;
                    tbody.appendChild(tr);
                });

                document.getElementById('update-time').textContent = `最后更新：${data.timestamp}`;
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="11" class="empty-state text-danger">监控数据加载失败。</td></tr>';
                showToast('监控数据加载失败', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '刷新数据';
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);
        document.getElementById('refresh-btn').addEventListener('click', loadData);
        document.getElementById('update-kline-btn').addEventListener('click', async function () {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 更新中';
            try {
                const response = await fetch('/api/monitor/update-kline', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force_update: false })
                });
                const result = await response.json();
                if (result.status === 'success') showToast('K 线更新任务已启动，请稍后刷新页面查看结果。', 'success');
                else showToast(`更新失败：${result.message}`, 'error');
            } catch (error) {
                showToast('更新失败，请检查网络连接。', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
    <script src="/static/ui.js"></script>
</body>
</html>
