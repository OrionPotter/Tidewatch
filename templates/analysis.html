<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析 - Tidewatch</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
    <section class="hero">
        <div class="hero-head">
            <div class="hero-title">
                <h1>价格行为分析</h1>
            </div>
        </div>
        <div class="nav-pills-bar">
            <a class="nav-chip" href="/">首页</a>
            <a class="nav-chip" href="/monitor">监控</a>
            <a class="nav-chip" href="/tools">工具</a>
            <a class="nav-chip" href="/portfolios">组合</a>
            <a class="nav-chip is-active" href="/analysis">分析</a>
            <a class="nav-chip" href="/recaps">复盘</a>
            <a class="nav-chip" href="/learn">学习</a>
            <a class="nav-chip" href="/admin">管理</a>
        </div>
    </section>

    <section class="surface section section-table">
        <div class="section-title">
            <div><h3>分析列表</h3></div>
            <div class="recap-list-toolbar">
                <div class="toolbar-summary" id="analysis-count">加载中...</div>
                <a class="btn btn-primary" href="/analysis/new">创建分析</a>
            </div>
        </div>
        <div class="table-wrap">
            <table class="table-modern recap-table analysis-table">
                <colgroup>
                    <col style="width: 16.66%;">
                    <col style="width: 16.66%;">
                    <col style="width: 16.66%;">
                    <col style="width: 16.66%;">
                    <col style="width: 16.66%;">
                    <col style="width: 16.66%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>股票</th>
                        <th>周期</th>
                        <th class="text-end">K线数</th>
                        <th>模型</th>
                        <th class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody id="analysis-table-body">
                    <tr><td colspan="6" class="empty-state">正在加载分析记录...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
<script src="/static/ui.js"></script>
<script>
function escapeHtml(value) {
    return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}

function formatDateCompact(value) {
    if (!value) {
        return '-';
    }
    return String(value).slice(0, 10);
}

function periodLabel(value) {
    if (value === 'daily') return '日线';
    if (value === 'weekly') return '周线';
    if (value === 'monthly') return '月线';
    return value || '-';
}

async function loadAnalyses() {
    const tbody = document.getElementById('analysis-table-body');
    try {
        const response = await fetch('/api/analysis');
        const result = await response.json();
        if (result.status !== 'success') {
            throw new Error('加载失败');
        }
        const reports = (result.data && result.data.reports) || [];
        document.getElementById('analysis-count').textContent = `${reports.length} 条记录`;
        if (!reports.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无分析记录</td></tr>';
            return;
        }
        tbody.innerHTML = reports.map(report => `
            <tr>
                <td class="mono">${formatDateCompact(report.created_at)}</td>
                <td>
                    <a class="recap-link" href="/analysis/${report.id}"><strong>${escapeHtml(report.stock_name || report.code)}</strong></a>
                    <div class="text-muted small mono">${escapeHtml(report.code)}</div>
                </td>
                <td>${periodLabel(report.period)}</td>
                <td class="text-end mono">${report.kline_count ?? '-'}</td>
                <td>${escapeHtml(report.model_name || '-')}</td>
                <td class="text-end">
                    <div class="recap-row-actions">
                        <a class="recap-detail-btn" href="/analysis/${report.id}">查看详情 <span>→</span></a>
                    </div>
                </td>
            </tr>
        `).join('');
    } catch (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state text-danger">分析记录加载失败</td></tr>';
        document.getElementById('analysis-count').textContent = '加载失败';
    }
}

document.addEventListener('DOMContentLoaded', loadAnalyses);
</script>
</body>
</html>
